name: Deploy Multi Agent AI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push to ACR
        run: |
          az acr build --registry multiagentai \
            --image multi-agent-ai:latest .

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name multi-agent-app \
            --resource-group multi-agent-rg \
            --image multiagentai.azurecr.io/multi-agent-ai:latest